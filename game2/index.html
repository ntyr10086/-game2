<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>清明除草大挑戰</title>
    <style>
        /* --- 圓潤可愛 CSS --- */
        :root {
            --bg-color: #fffde7;
            --primary-orange: #ffa000;
            --soft-brown: #d7ccc8;
            --accent-red: #ff7979;
        }

        body {
            background: #fff9c4; font-family: "微軟正黑體", sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        #game-container {
            background: white; padding: 40px; border-radius: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center; width: 600px; border: 12px solid white;
        }

        h1 { color: var(--primary-orange); font-size: 32px; margin-bottom: 15px; }
        
        #story-text { 
            background: #fff8e1; padding: 15px; border-radius: 20px; 
            color: #795548; font-weight: bold; margin-bottom: 20px;
            border: 2px dashed #ffcc80; font-size: 18px;
        }
        
        canvas { 
            border-radius: 30px; background: #fff; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05); 
            border: 5px solid #eee; cursor: crosshair;
        }

        button {
            padding: 15px 50px; font-size: 22px; font-weight: bold;
            background: linear-gradient(to bottom, #ffcc80, #ffa000);
            color: white; border: none; border-radius: 40px;
            cursor: pointer; box-shadow: 0 8px 0 #e65100; transition: 0.1s; margin-top: 20px;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #e65100; }

        #score-board { 
            margin-top: 15px; font-size: 26px; background: var(--accent-red); 
            color: white; padding: 10px 50px; border-radius: 55px; 
            display: inline-block; font-weight: bold; 
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>除草大作戰 🌿</h1>
        <p style="color:#666; font-size: 18px;">墓園長滿雜草了！快幫忙清理乾淨吧。<br>拿到 20 分就達成任務！</p>
        <button onclick="startGame()">開始拔草</button>
    </div>

    <div id="game-stage" style="display:none;">
        <div id="story-text">🌿 點擊「雜草」+2分，誤點「小花」-2分！</div>
        <canvas id="gameCanvas" width="540" height="380"></canvas>
        <br>
        <div id="score-board">✨ 進度: <span id="progress-score">0</span> / 20</div>
    </div>

    <div id="end-screen" style="display:none;">
        <h2 style="color:var(--primary-orange); font-size: 36px;">✨ 任務達成！</h2>
        <p style="font-size: 22px; font-weight: bold; color: #444;">墓園被妳整理得閃閃發亮唷！<br>(｡◕∀◕｡)b</p>
        <button onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    // --- 🔊 音效引擎 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f, t, d) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    }
    const sound = {
        ok: () => playSfx(880, 'sine', 0.2),
        no: () => playSfx(150, 'sawtooth', 0.4),
        win: () => { playSfx(523, 'sine', 0.1); setTimeout(()=>playSfx(783, 'sine', 0.3), 100); }
    };

    // --- 🎮 遊戲變數 ---
    let levelScore = 0, isGameOver = false, lastPopTime = 0;
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    
    const holesPos = [
        {x: 110, y: 90}, {x: 270, y: 90}, {x: 430, y: 90},
        {x: 110, y: 190}, {x: 270, y: 190}, {x: 430, y: 190},
        {x: 110, y: 290}, {x: 270, y: 290}, {x: 430, y: 290}
    ];
    let holeStatus = new Array(9).fill(0);

    function startGame() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("game-stage").style.display = "block";
        
        canvas.onmousedown = e => {
            const r = canvas.getBoundingClientRect(); 
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            holesPos.forEach((p, i) => {
                if (Math.abs(mx - p.x) < 50 && Math.abs(my - p.y) < 50) {
                    if (holeStatus[i] === 1) { sound.ok(); levelScore += 2; holeStatus[i] = 0; }
                    else if (holeStatus[i] === 2) { sound.no(); levelScore = Math.max(0, levelScore - 2); holeStatus[i] = 0; }
                    document.getElementById("progress-score").innerText = levelScore;
                    if (levelScore >= 20) endGame();
                }
            });
        };
        gameLoop();
    }

    function drawEmoji(emoji, x, y, size) {
        ctx.font = `${size}px serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(emoji, x, y);
    }

    function gameLoop() {
        if(isGameOver) return;
        ctx.fillStyle = "#fffde7"; ctx.fillRect(0,0,540,380);
        holesPos.forEach(p => {
            ctx.fillStyle = "#d7ccc8"; ctx.beginPath();
            ctx.ellipse(p.x, p.y + 20, 40, 15, 0, 0, Math.PI * 2); ctx.fill();
        });
        let now = Date.now();
        if (now - lastPopTime > 700) {
            let randIdx = Math.floor(Math.random() * 9);
            if (holeStatus[randIdx] === 0) {
                holeStatus[randIdx] = Math.random() < 0.25 ? 2 : 1;
                setTimeout(() => { if(!isGameOver) holeStatus[randIdx] = 0; }, 1000);
            }
            lastPopTime = now;
        }
        holesPos.forEach((p, i) => {
            if (holeStatus[i] === 1) drawEmoji("🌿", p.x, p.y, 50);
            if (holeStatus[i] === 2) drawEmoji("🌸", p.x, p.y, 45);
        });
        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        isGameOver = true;
        sound.win();
        document.getElementById("game-stage").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        // 這裡完全移除了排行榜存檔與顯示的邏輯
    }
</script>

</body>
</html>
